<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Cards - Contatos</title>
  <link rel="stylesheet" href="sobre.css">

    <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <button class="btn-voltar" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i>
    <span>Voltar</span>
  </button>


  <!-- ======= Container de Cards ======= -->
  <div class="cards-container">

  <!-- ======= Pedro Luiz ======= -->
<div class="card-wrapper">
    <h2 class="nome-pessoa">Pedro Luiz</h2>
  <div class="flip-card">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <img src="./img/WhatsApp Image 2025-10-27 at 21.36.22.jpeg" alt="Foto Pessoa 1">
      </div>
      <div class="flip-card-back">
        <div class="icons">
          <a href="https://www.instagram.com/santossdxz?igsh=ZzBsZ2cyeXA2dG5u" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://wa.me/5511953807699" target="_blank">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

  <!-- ======= Fabricio Ramos ======= -->
<div class="card-wrapper">
    <h2 class="nome-pessoa">Fabricio Ramos</h2>
  <div class="flip-card">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <img src="./img/WhatsApp Image 2025-10-27 at 21.35.34.jpeg" alt="Foto Pessoa 2">
      </div>
      <div class="flip-card-back">
        <div class="icons">
          <a href="https://www.instagram.com/fa.ramsw_?igsh=NjNpYWt6MGZtamlz" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://wa.me/5511930992281" target="_blank">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
